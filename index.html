<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NIM Chat</title>
  <meta name="theme-color" content="#141414" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <!-- ── Password Gate Overlay ── -->
  <div class="gate-overlay" id="gateOverlay">
    <div class="gate-card">
      <div class="gate-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <p class="gate-title">NIM Chat</p>
      <p class="gate-sub">Enter the app password to continue.</p>
      <input
        type="password"
        id="gateInput"
        class="text-input"
        placeholder="Password…"
        autocomplete="current-password"
      />
      <button class="send-btn gate-submit-btn" id="gateSubmit">Unlock</button>
      <span class="gate-error" id="gateError"></span>
    </div>
  </div>

  <!-- Overlays -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="modal-overlay" id="modalOverlay"></div>

  <!-- ── Chat History Sidebar ── -->
  <aside class="settings-drawer" id="settingsDrawer">
    <div class="drawer-header">
      <span class="drawer-title">Chats</span>
      <button class="drawer-close" id="drawerClose" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Model selector -->
    <div class="drawer-section">
      <label class="section-label" for="modelSelect">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Model
      </label>
      <div class="select-wrapper">
        <select id="modelSelect"><option value="">Loading…</option></select>
        <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <button class="refresh-btn" id="refreshModels">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Refresh
      </button>
    </div>

    <!-- Actions row -->
    <div class="drawer-section drawer-actions-row">
      <button class="action-btn" id="exportChat">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="action-btn danger" id="clearChat">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear
      </button>
    </div>

    <!-- Session history -->
    <div class="drawer-section session-list-section">
      <label class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </label>
      <div class="session-list" id="sessionList">
        <span class="session-empty">No previous chats</span>
      </div>
    </div>

    <!-- Settings gear at bottom -->
    <div class="drawer-footer">
      <button class="drawer-footer-btn" id="openSettings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- ── Settings Modal ── -->
  <div class="settings-modal" id="settingsModal">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="drawer-close" id="modalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">

      <!-- Persona Manager -->
      <div class="modal-section">
        <label class="section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Persona Manager
        </label>
        <div class="persona-bar">
          <div class="select-wrapper" style="flex:1">
            <select id="personaSelect"><option value="">— No persona —</option></select>
            <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="icon-btn" id="deletePersonaBtn" title="Delete selected persona">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
        <input type="text" id="personaTitleInput" class="text-input" placeholder="Persona name (e.g. Code Assistant)" />
        <textarea id="personaInput" placeholder="System prompt — define the AI's role and behavior…" rows="5"></textarea>
        <button class="action-btn accent" id="savePersonaBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save persona
        </button>
        <span class="section-hint">A hidden system context about NimChat is always prepended automatically.</span>
      </div>

      <!-- Parameters -->
      <div class="modal-section">
        <label class="section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Parameters
        </label>
        <div class="param-row">
          <span class="param-label">Temperature</span>
          <div class="param-controls">
            <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="0.7" />
            <span class="param-value" id="tempValue">0.70</span>
          </div>
        </div>
        <div class="param-row">
          <span class="param-label">Max tokens</span>
          <div class="param-controls">
            <input type="range" id="maxTokensSlider" min="256" max="4096" step="64" value="1024" />
            <span class="param-value" id="maxTokensValue">1024</span>
          </div>
        </div>
      </div>

      <!-- Theme -->
      <div class="modal-section">
        <label class="section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Theme
        </label>
        <div class="theme-switcher" id="themeSwitcher">
          <button class="theme-btn" data-theme="">Default Dark</button>
          <button class="theme-btn" data-theme="theme-midnight">Midnight Blue</button>
          <button class="theme-btn" data-theme="theme-oled">OLED Black</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── App Shell ── -->
  <div class="app-shell" id="appShell">
    <header class="app-header">
      <button class="icon-btn" id="menuBtn" aria-label="Chat history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-center">
        <span class="header-model-name" id="headerModelName">NIM Chat</span>
      </div>
      <button class="icon-btn" id="newChatBtn" aria-label="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>

    <main class="chat-container" id="chatContainer">
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <p class="welcome-title">NIM Chat</p>
        <p class="welcome-sub">Select a model and start a conversation.</p>
      </div>
      <div class="messages-list" id="messagesList">
        <div id="scrollAnchor" style="height:1px;float:left;clear:both;"></div>
      </div>
    </main>

    <footer class="input-area">
      <div class="attachment-strip" id="attachmentStrip"></div>
      <div class="input-wrapper">
        <input type="file" id="fileInput" multiple accept="image/*,.pdf" style="display:none" />
        <button class="attach-btn" id="attachBtn" aria-label="Attach file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <textarea id="messageInput" placeholder="Message…" rows="1" maxlength="64000"></textarea>
        <!-- Send button -->
        <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
        <!-- Stop button (visible during streaming) -->
        <button class="stop-btn" id="stopBtn" aria-label="Stop generation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
